# Post-Pilot Alembic configuration
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Relative path to migrations directory
script_location = alembic

# DB URL is set dynamically in env.py from DATABASE_URL env var.
# Set a fallback here for local dev only -- do NOT commit real credentials.
sqlalchemy.url = sqlite:///postpilot.db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
