<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — PostPilot Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-icon { font-size: 2.4rem; display: block; margin-bottom: .4rem; }
    .logo h1   { font-size: 1.4rem; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .logo p    { color: #6b7280; font-size: .85rem; margin-top: .25rem; }
    .flash {
      background: #2d1f1f;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      border-radius: 8px;
      padding: .75rem 1rem;
      margin-bottom: 1.25rem;
      font-size: .875rem;
    }
    label {
      display: block;
      color: #9ca3af;
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: .4rem;
    }
    input[type=email], input[type=password] {
      width: 100%;
      padding: .75rem 1rem;
      background: #0f1117;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      color: #fff;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 1.25rem;
    }
    input:focus { border-color: #6366f1; }
    .btn {
      display: block;
      width: 100%;
      padding: .85rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity .15s;
      margin-top: .25rem;
    }
    .btn:hover { opacity: .88; }
    .divider {
      text-align: center;
      color: #374151;
      font-size: .8rem;
      margin: 1.5rem 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #2a2d3e;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }
    .footer-link { text-align: center; color: #6b7280; font-size: .875rem; }
    .footer-link a { color: #818cf8; text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🚀</span>
    <h1>PostPilot Pro</h1>
    <p>Sign in to your account</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="email">Email</label>
    <input type="email" id="email" name="email"
           placeholder="you@example.com"
           value="{{ request.form.get('email', '') }}"
           required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password"
           placeholder="Your password"
           required>

    <button type="submit" class="btn">Sign In →</button>
  </form>

  <div class="divider">don't have an account?</div>
  <p class="footer-link"><a href="/register">Create a free account →</a></p>
</div>
</body>
</html>
