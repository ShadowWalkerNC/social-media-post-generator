<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostPilot Pro — Calendar</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/">🚀 PostPilot Pro</a> |
        <a href="/generate">✏️ Generate</a> |
        <a href="/analytics">📊 Analytics</a>
    </nav>
    <div class="container">
        <div class="card">
            <h1>📅 Content Calendar</h1>
            <p class="subtitle">Your weekly posting schedule at a glance</p>
            <table class="calendar">
                <thead><tr><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th></tr></thead>
                <tbody><tr>
                    <td class="cal-cell"><span class="cal-tag ig">📍 8AM</span><br>Location</td>
                    <td class="cal-cell"><span class="cal-tag ig">🍔 11AM</span><br>Menu</td>
                    <td class="cal-cell"><span class="cal-tag ig">❓ 5PM</span><br>Engage</td>
                    <td class="cal-cell"><span class="cal-tag ig">👨‍🍳 8AM</span><br>Team</td>
                    <td class="cal-cell"><span class="cal-tag fb">🎊 11AM</span><br>Giveaway</td>
                    <td class="cal-cell"><span class="cal-tag ig">📍 8AM</span><br>Location</td>
                    <td class="cal-cell"><span class="cal-tag ig">❓ 5PM</span><br>Poll</td>
                </tr></tbody>
            </table>
            <div class="legend">
                <span class="cal-tag ig">Instagram</span>
                <span class="cal-tag fb">Facebook</span>
            </div>
        </div>
    </div>
</body>
</html>
