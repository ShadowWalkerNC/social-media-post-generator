[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python3.11 -m venv /app/.venv",
  "/app/.venv/bin/pip install -r requirements.txt",
  "npm install"
]

[phases.build]
cmds = ["npx tailwindcss -i ./static/input.css -o ./static/output.css --minify"]

[start]
cmd = "/app/.venv/bin/gunicorn app:app --bind 0.0.0.0:$PORT"
