# ═══════════════════════════════════════════════════════
# Post-Pilot — Railway deployment config
# Docs: https://docs.railway.app/reference/config-as-code
# ═══════════════════════════════════════════════════════

[build]
buildCommand = "pip install -r requirements.txt"

# ── Web service (Flask app) ──────────────────────────────
[deploy]
startCommand = "gunicorn app:app --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Environment ─────────────────────────────────────────
# Set these in the Railway dashboard under Variables.
# Do NOT hardcode secrets here.
#
# Required:
#   DATABASE_URL        (Railway Postgres plugin auto-injects this)
#   FLASK_SECRET_KEY
#   TOKEN_ENCRYPTION_KEY
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   OPENAI_API_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_PRICE_STARTER / _GROWTH / _AGENCY
#   FACEBOOK_APP_ID / FACEBOOK_APP_SECRET
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
#   TIKTOK_CLIENT_KEY / TIKTOK_CLIENT_SECRET
#   TWITTER_CLIENT_ID / TWITTER_CLIENT_SECRET
#   REDIS_URL           (Railway Redis plugin auto-injects this)
#   SENTRY_DSN          (optional)
#
# Set automatically by Railway (do not override):
#   PORT
#   RAILWAY_ENVIRONMENT
#   RAILWAY_PUBLIC_DOMAIN
